<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow — To-Do App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&display=swap" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@700,800&display=swap" rel="stylesheet">
  <style>
    /* =============================================
       DESIGN TOKENS
    ============================================= */
    :root {
      --font-display: 'Cabinet Grotesk', 'Inter', sans-serif;
      --font-body: 'Inter', sans-serif;

      --text-xs:   clamp(0.75rem,  0.7rem  + 0.25vw, 0.875rem);
      --text-sm:   clamp(0.875rem, 0.8rem  + 0.35vw, 1rem);
      --text-base: clamp(1rem,     0.95rem + 0.25vw, 1.125rem);
      --text-lg:   clamp(1.125rem, 1rem    + 0.75vw, 1.5rem);
      --text-xl:   clamp(1.5rem,   1.2rem  + 1.25vw, 2.25rem);

      --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem;
      --space-4: 1rem; --space-5: 1.25rem; --space-6: 1.5rem;
      --space-8: 2rem; --space-10: 2.5rem; --space-12: 3rem;
      --space-16: 4rem;

      --radius-sm: 0.375rem; --radius-md: 0.5rem;
      --radius-lg: 0.75rem; --radius-xl: 1rem;
      --radius-2xl: 1.25rem; --radius-full: 9999px;
      --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* DARK MODE (default) */
    :root, [data-theme="dark"] {
      --color-bg:             #0c0c10;
      --color-surface:        #111118;
      --color-surface-2:      #16161f;
      --color-surface-3:      #1c1c27;
      --color-border:         rgba(255,255,255,0.07);
      --color-border-hover:   rgba(255,255,255,0.14);
      --color-text:           #e8e6f0;
      --color-text-muted:     #8a88a0;
      --color-text-faint:     #4a4860;
      --color-purple:         #8b5cf6;
      --color-purple-hover:   #7c3aed;
      --color-purple-glow:    rgba(139,92,246,0.2);
      --color-purple-subtle:  rgba(139,92,246,0.1);
      --color-purple-dim:     rgba(139,92,246,0.06);
      --color-white:          #ffffff;
      --color-success:        #22c55e;
      --color-error:          #f87171;
      --color-warning:        #fbbf24;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.4);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.5);
      --shadow-lg: 0 12px 40px rgba(0,0,0,0.6);
      --shadow-purple: 0 0 24px rgba(139,92,246,0.25);
    }

    /* LIGHT MODE */
    [data-theme="light"] {
      --color-bg:             #f5f4fa;
      --color-surface:        #ffffff;
      --color-surface-2:      #f9f8ff;
      --color-surface-3:      #f0eefb;
      --color-border:         rgba(139,92,246,0.12);
      --color-border-hover:   rgba(139,92,246,0.25);
      --color-text:           #1a1828;
      --color-text-muted:     #6b6882;
      --color-text-faint:     #b0aec8;
      --color-purple:         #7c3aed;
      --color-purple-hover:   #6d28d9;
      --color-purple-glow:    rgba(124,58,237,0.15);
      --color-purple-subtle:  rgba(124,58,237,0.08);
      --color-purple-dim:     rgba(124,58,237,0.04);
      --color-white:          #1a1828;
      --color-success:        #16a34a;
      --color-error:          #dc2626;
      --color-warning:        #d97706;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
      --shadow-lg: 0 12px 40px rgba(0,0,0,0.1);
      --shadow-purple: 0 0 24px rgba(124,58,237,0.12);
    }

    /* =============================================
       BASE RESET
    ============================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
    body {
      min-height: 100dvh;
      font-family: var(--font-body);
      font-size: var(--text-base);
      color: var(--color-text);
      background: var(--color-bg);
      transition: background var(--transition), color var(--transition);
      overflow-x: hidden;
    }
    button { cursor: pointer; background: none; border: none; font: inherit; color: inherit; }
    input, textarea { font: inherit; color: inherit; }
    :focus-visible { outline: 2px solid var(--color-purple); outline-offset: 3px; border-radius: var(--radius-sm); }

    /* =============================================
       BACKGROUND DECORATION
    ============================================= */
    .bg-orb {
      position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
      filter: blur(80px); opacity: 0.35;
    }
    .bg-orb-1 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(139,92,246,0.4), transparent 70%);
      top: -100px; right: -100px;
    }
    .bg-orb-2 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(139,92,246,0.2), transparent 70%);
      bottom: 100px; left: -80px;
    }
    [data-theme="light"] .bg-orb { opacity: 0.15; }

    /* =============================================
       LAYOUT
    ============================================= */
    .app-wrapper {
      position: relative; z-index: 1;
      min-height: 100dvh;
      display: grid;
      grid-template-columns: 280px 1fr;
      grid-template-rows: auto 1fr;
    }

    /* =============================================
       HEADER
    ============================================= */
    header {
      grid-column: 1 / -1;
      display: flex; align-items: center; justify-content: space-between;
      padding: var(--space-4) var(--space-8);
      background: color-mix(in oklab, var(--color-surface) 80%, transparent);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--color-border);
      position: sticky; top: 0; z-index: 100;
    }
    .logo {
      display: flex; align-items: center; gap: var(--space-3);
      font-family: var(--font-display);
      font-size: var(--text-lg);
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--color-text);
      text-decoration: none;
    }
    .logo svg { flex-shrink: 0; }
    .logo-dot { color: var(--color-purple); }
    .header-actions { display: flex; align-items: center; gap: var(--space-3); }
    .header-greeting {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
    }

    /* =============================================
       SIDEBAR
    ============================================= */
    .sidebar {
      padding: var(--space-6) var(--space-5);
      border-right: 1px solid var(--color-border);
      display: flex; flex-direction: column; gap: var(--space-6);
      position: sticky; top: 60px;
      height: calc(100dvh - 60px);
      overflow-y: auto;
    }
    .sidebar-section-title {
      font-size: var(--text-xs);
      font-weight: 600;
      color: var(--color-text-faint);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0 var(--space-3);
      margin-bottom: var(--space-2);
    }
    .sidebar-nav { display: flex; flex-direction: column; gap: var(--space-1); }
    .sidebar-item {
      display: flex; align-items: center; gap: var(--space-3);
      padding: var(--space-2) var(--space-3);
      border-radius: var(--radius-md);
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      cursor: pointer;
      transition: all var(--transition);
      border: 1px solid transparent;
    }
    .sidebar-item:hover { background: var(--color-purple-dim); color: var(--color-text); }
    .sidebar-item.active {
      background: var(--color-purple-subtle);
      color: var(--color-purple);
      border-color: var(--color-border-hover);
    }
    .sidebar-item .count {
      margin-left: auto;
      background: var(--color-surface-3);
      color: var(--color-text-muted);
      font-size: var(--text-xs);
      padding: 0.1em 0.5em;
      border-radius: var(--radius-full);
      min-width: 20px;
      text-align: center;
    }
    .sidebar-item.active .count {
      background: var(--color-purple-subtle);
      color: var(--color-purple);
    }

    /* Progress Ring */
    .progress-card {
      background: var(--color-surface-2);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      padding: var(--space-5);
    }
    .progress-card-title {
      font-size: var(--text-sm);
      font-weight: 600;
      margin-bottom: var(--space-4);
      color: var(--color-text);
    }
    .progress-ring-wrap {
      display: flex; align-items: center; gap: var(--space-4);
    }
    .progress-ring-svg { transform: rotate(-90deg); }
    .progress-track { fill: none; stroke: var(--color-border); stroke-width: 6; }
    .progress-fill {
      fill: none; stroke: var(--color-purple); stroke-width: 6;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.6s cubic-bezier(0.34,1.56,0.64,1);
    }
    .progress-label { display: flex; flex-direction: column; }
    .progress-pct { font-size: var(--text-xl); font-family: var(--font-display); font-weight: 800; color: var(--color-text); }
    .progress-sub { font-size: var(--text-xs); color: var(--color-text-muted); }

    /* =============================================
       MAIN CONTENT
    ============================================= */
    main { padding: var(--space-8); display: flex; flex-direction: column; gap: var(--space-6); }

    /* Page Title */
    .page-header {
      display: flex; align-items: flex-end; justify-content: space-between;
      gap: var(--space-4);
    }
    .page-title-wrap {}
    .page-label { font-size: var(--text-xs); font-weight: 600; color: var(--color-purple); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: var(--space-2); }
    .page-title {
      font-family: var(--font-display);
      font-size: var(--text-xl);
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--color-text);
      line-height: 1.1;
    }

    /* Stats Row */
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-4); }
    .stat-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      padding: var(--space-5);
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .stat-card:hover { border-color: var(--color-border-hover); box-shadow: var(--shadow-md); }
    .stat-label { font-size: var(--text-xs); color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: var(--space-2); }
    .stat-value {
      font-size: var(--text-xl);
      font-family: var(--font-display);
      font-weight: 800;
      color: var(--color-text);
      line-height: 1;
      font-variant-numeric: tabular-nums;
      transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    .stat-card.purple .stat-value { color: var(--color-purple); }

    /* Input Area */
    .input-section {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-2xl);
      padding: var(--space-5);
      display: flex; flex-direction: column; gap: var(--space-4);
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .input-section:focus-within { border-color: var(--color-border-hover); box-shadow: var(--shadow-purple); }
    .input-row { display: flex; gap: var(--space-3); align-items: center; }
    .task-input {
      flex: 1;
      background: var(--color-surface-2);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-3) var(--space-4);
      font-size: var(--text-base);
      color: var(--color-text);
      outline: none;
      transition: all var(--transition);
    }
    .task-input:focus { border-color: var(--color-purple); box-shadow: 0 0 0 3px var(--color-purple-glow); }
    .task-input::placeholder { color: var(--color-text-faint); }

    .input-meta { display: flex; gap: var(--space-3); align-items: center; flex-wrap: wrap; }
    .meta-select {
      background: var(--color-surface-2);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--space-2) var(--space-3);
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      outline: none;
      cursor: pointer;
      transition: all var(--transition);
    }
    .meta-select:focus { border-color: var(--color-purple); }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; gap: var(--space-2);
      padding: var(--space-2) var(--space-5);
      border-radius: var(--radius-lg);
      font-size: var(--text-sm);
      font-weight: 600;
      transition: all var(--transition);
      white-space: nowrap;
    }
    .btn-primary {
      background: var(--color-purple);
      color: #fff;
      box-shadow: 0 2px 8px var(--color-purple-glow);
    }
    .btn-primary:hover { background: var(--color-purple-hover); box-shadow: var(--shadow-purple); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-ghost {
      background: transparent;
      color: var(--color-text-muted);
      border: 1px solid var(--color-border);
    }
    .btn-ghost:hover { background: var(--color-purple-dim); color: var(--color-text); border-color: var(--color-border-hover); }

    /* Icon Button */
    .icon-btn {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      border-radius: var(--radius-md);
      color: var(--color-text-muted);
      transition: all var(--transition);
      border: 1px solid transparent;
    }
    .icon-btn:hover { background: var(--color-purple-dim); color: var(--color-text); border-color: var(--color-border); }

    /* Toolbar */
    .toolbar {
      display: flex; align-items: center; justify-content: space-between; gap: var(--space-4);
      flex-wrap: wrap;
    }
    .filter-group { display: flex; gap: var(--space-2); }
    .filter-btn {
      padding: var(--space-2) var(--space-4);
      border-radius: var(--radius-full);
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--color-text-muted);
      border: 1px solid transparent;
      transition: all var(--transition);
    }
    .filter-btn:hover { background: var(--color-purple-dim); color: var(--color-text); }
    .filter-btn.active {
      background: var(--color-purple-subtle);
      color: var(--color-purple);
      border-color: var(--color-border-hover);
    }

    .search-wrap {
      position: relative; display: flex; align-items: center;
    }
    .search-wrap svg {
      position: absolute; left: var(--space-3);
      color: var(--color-text-faint); pointer-events: none;
    }
    .search-input {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-full);
      padding: var(--space-2) var(--space-4) var(--space-2) var(--space-10);
      font-size: var(--text-sm);
      color: var(--color-text);
      outline: none;
      width: 200px;
      transition: all var(--transition);
    }
    .search-input:focus { border-color: var(--color-purple); width: 240px; }
    .search-input::placeholder { color: var(--color-text-faint); }

    /* =============================================
       TASK LIST
    ============================================= */
    .task-list { display: flex; flex-direction: column; gap: var(--space-3); }

    .task-group-label {
      font-size: var(--text-xs);
      font-weight: 600;
      color: var(--color-text-faint);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: var(--space-2) 0;
      display: flex; align-items: center; gap: var(--space-3);
    }
    .task-group-label::after {
      content: ''; flex: 1; height: 1px; background: var(--color-border);
    }

    .task-item {
      display: grid;
      grid-template-columns: 36px 1fr auto;
      align-items: center;
      gap: var(--space-4);
      padding: var(--space-4) var(--space-5);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      transition: all var(--transition);
      animation: taskIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
      position: relative;
      overflow: hidden;
    }
    .task-item::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      border-radius: var(--radius-sm) 0 0 var(--radius-sm);
      transition: opacity var(--transition);
      opacity: 0;
    }
    .task-item:hover { border-color: var(--color-border-hover); box-shadow: var(--shadow-sm); transform: translateX(2px); }
    .task-item:hover::before { opacity: 1; }
    .task-item.priority-high::before { background: var(--color-error); }
    .task-item.priority-medium::before { background: var(--color-warning); }
    .task-item.priority-low::before { background: var(--color-success); }
    .task-item.done { opacity: 0.5; }
    .task-item.done:hover { opacity: 0.7; }

    @keyframes taskIn {
      from { opacity: 0; transform: translateY(-6px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes taskOut {
      to { opacity: 0; transform: translateX(20px) scale(0.97); }
    }
    .task-item.removing { animation: taskOut 0.2s ease forwards; }

    /* Checkbox */
    .check-wrap { display: flex; align-items: center; justify-content: center; }
    .task-checkbox {
      width: 22px; height: 22px;
      border-radius: var(--radius-sm);
      border: 2px solid var(--color-border-hover);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all var(--transition);
      flex-shrink: 0;
    }
    .task-checkbox:hover { border-color: var(--color-purple); background: var(--color-purple-dim); }
    .task-checkbox.checked {
      background: var(--color-purple);
      border-color: var(--color-purple);
      box-shadow: 0 0 12px var(--color-purple-glow);
    }
    .task-checkbox.checked svg { opacity: 1; transform: scale(1); }
    .task-checkbox svg { opacity: 0; transform: scale(0.5); transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1); color: #fff; }

    /* Task Content */
    .task-content { display: flex; flex-direction: column; gap: var(--space-1); min-width: 0; }
    .task-text {
      font-size: var(--text-base);
      color: var(--color-text);
      transition: all var(--transition);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .task-item.done .task-text { text-decoration: line-through; color: var(--color-text-faint); }
    .task-meta { display: flex; align-items: center; gap: var(--space-3); flex-wrap: wrap; }

    /* Tags/Badges */
    .tag {
      font-size: var(--text-xs);
      padding: 0.15em 0.6em;
      border-radius: var(--radius-full);
      font-weight: 500;
      line-height: 1.6;
    }
    .tag-category {
      background: var(--color-purple-subtle);
      color: var(--color-purple);
    }
    .tag-date { color: var(--color-text-faint); }
    .tag-priority-high { background: rgba(248,113,113,0.1); color: var(--color-error); }
    .tag-priority-medium { background: rgba(251,191,36,0.1); color: var(--color-warning); }
    .tag-priority-low { background: rgba(34,197,94,0.1); color: var(--color-success); }

    /* Task Actions */
    .task-actions { display: flex; align-items: center; gap: var(--space-1); opacity: 0; transition: opacity var(--transition); }
    .task-item:hover .task-actions { opacity: 1; }
    .task-action-btn {
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      border-radius: var(--radius-md);
      color: var(--color-text-faint);
      transition: all var(--transition);
    }
    .task-action-btn:hover.delete { background: rgba(248,113,113,0.1); color: var(--color-error); }
    .task-action-btn:hover.edit { background: var(--color-purple-dim); color: var(--color-purple); }

    /* Empty State */
    .empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: var(--space-16) var(--space-8);
      text-align: center;
      gap: var(--space-4);
    }
    .empty-icon {
      width: 60px; height: 60px;
      background: var(--color-purple-dim);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      display: flex; align-items: center; justify-content: center;
      color: var(--color-purple);
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    .empty-title { font-size: var(--text-lg); font-weight: 700; color: var(--color-text); font-family: var(--font-display); }
    .empty-sub { font-size: var(--text-sm); color: var(--color-text-muted); max-width: 28ch; }

    /* Edit Modal */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      padding: var(--space-4);
      opacity: 0; pointer-events: none;
      transition: opacity var(--transition);
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-2xl);
      padding: var(--space-8);
      width: 100%; max-width: 480px;
      display: flex; flex-direction: column; gap: var(--space-5);
      transform: scale(0.95) translateY(10px);
      transition: transform var(--transition);
      box-shadow: var(--shadow-lg), var(--shadow-purple);
    }
    .modal-overlay.open .modal { transform: scale(1) translateY(0); }
    .modal-title { font-family: var(--font-display); font-size: var(--text-lg); font-weight: 800; }
    .modal-label { font-size: var(--text-sm); font-weight: 600; color: var(--color-text-muted); margin-bottom: var(--space-2); display: block; }
    .modal-input {
      width: 100%;
      background: var(--color-surface-2);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-3) var(--space-4);
      font-size: var(--text-base);
      color: var(--color-text);
      outline: none;
      transition: all var(--transition);
    }
    .modal-input:focus { border-color: var(--color-purple); box-shadow: 0 0 0 3px var(--color-purple-glow); }
    .modal-actions { display: flex; gap: var(--space-3); justify-content: flex-end; }

    /* Toast */
    .toast-container { position: fixed; bottom: var(--space-6); right: var(--space-6); z-index: 300; display: flex; flex-direction: column; gap: var(--space-2); }
    .toast {
      background: var(--color-surface-3);
      border: 1px solid var(--color-border-hover);
      border-radius: var(--radius-xl);
      padding: var(--space-3) var(--space-5);
      font-size: var(--text-sm);
      font-weight: 500;
      box-shadow: var(--shadow-lg);
      animation: toastIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
      display: flex; align-items: center; gap: var(--space-3);
    }
    @keyframes toastIn { from { opacity:0; transform:translateY(12px) scale(0.95); } to { opacity:1; transform:none; } }
    @keyframes toastOut { to { opacity:0; transform:translateX(20px); } }
    .toast.out { animation: toastOut 0.2s ease forwards; }
    .toast-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .toast.success .toast-dot { background: var(--color-success); }
    .toast.error .toast-dot { background: var(--color-error); }
    .toast.info .toast-dot { background: var(--color-purple); }

    /* Confetti */
    .confetti-piece {
      position: fixed; width: 8px; height: 8px;
      border-radius: 2px;
      pointer-events: none; z-index: 400;
      animation: confettiFall 1.2s ease-in forwards;
    }
    @keyframes confettiFall {
      0% { opacity: 1; transform: translateY(0) rotate(0deg); }
      100% { opacity: 0; transform: translateY(300px) rotate(720deg); }
    }

    /* Dark/Light Toggle */
    .theme-toggle {
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      border-radius: var(--radius-lg);
      color: var(--color-text-muted);
      border: 1px solid var(--color-border);
      background: var(--color-surface);
      transition: all var(--transition);
    }
    .theme-toggle:hover { color: var(--color-purple); border-color: var(--color-border-hover); }

    /* Keyboard shortcut hint */
    .kbd {
      background: var(--color-surface-3);
      border: 1px solid var(--color-border);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 11px;
      color: var(--color-text-faint);
      font-family: monospace;
    }

    /* =============================================
       RESPONSIVE
    ============================================= */
    @media (max-width: 768px) {
      .app-wrapper { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      main { padding: var(--space-4); }
      .stats-row { grid-template-columns: 1fr 1fr; }
      .stats-row .stat-card:last-child { grid-column: 1 / -1; }
      header { padding: var(--space-4); }
      .search-input { width: 160px; }
      .header-greeting { display: none; }
    }
    @media (max-width: 480px) {
      .stats-row { grid-template-columns: 1fr; }
      .toolbar { flex-direction: column; align-items: flex-start; }
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>
  <!-- Background decoration -->
  <div class="bg-orb bg-orb-1" aria-hidden="true"></div>
  <div class="bg-orb bg-orb-2" aria-hidden="true"></div>

  <div class="app-wrapper">
    <!-- HEADER -->
    <header>
      <a href="#" class="logo" aria-label="TaskFlow home">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-hidden="true">
          <rect width="28" height="28" rx="8" fill="#8b5cf6"/>
          <path d="M8 14l4 4 8-8" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Task<span class="logo-dot">Flow</span>
      </a>
      <div class="header-actions">
        <span class="header-greeting" id="greeting"></span>
        <button class="theme-toggle" data-theme-toggle aria-label="Switch to light mode" title="Toggle theme">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- SIDEBAR -->
    <aside class="sidebar" role="navigation" aria-label="Task filters">
      <div>
        <p class="sidebar-section-title">Views</p>
        <nav class="sidebar-nav">
          <button class="sidebar-item active" data-filter="all" aria-pressed="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
            All Tasks
            <span class="count" id="count-all">0</span>
          </button>
          <button class="sidebar-item" data-filter="active" aria-pressed="false">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            Active
            <span class="count" id="count-active">0</span>
          </button>
          <button class="sidebar-item" data-filter="done" aria-pressed="false">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
            Completed
            <span class="count" id="count-done">0</span>
          </button>
          <button class="sidebar-item" data-filter="high" aria-pressed="false">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg>
            High Priority
            <span class="count" id="count-high">0</span>
          </button>
        </nav>
      </div>
      <div>
        <p class="sidebar-section-title">Categories</p>
        <nav class="sidebar-nav" id="category-nav"></nav>
      </div>
      <div style="margin-top:auto;">
        <div class="progress-card">
          <p class="progress-card-title">Today's Progress</p>
          <div class="progress-ring-wrap">
            <svg class="progress-ring-svg" width="60" height="60" aria-hidden="true">
              <circle class="progress-track" cx="30" cy="30" r="24"/>
              <circle class="progress-fill" id="progress-ring" cx="30" cy="30" r="24"
                stroke-dasharray="150.8" stroke-dashoffset="150.8"/>
            </svg>
            <div class="progress-label">
              <span class="progress-pct" id="progress-pct">0%</span>
              <span class="progress-sub" id="progress-sub">0 of 0 done</span>
            </div>
          </div>
        </div>
      </div>
    </aside>

    <!-- MAIN -->
    <main>
      <!-- Page Header -->
      <div class="page-header">
        <div class="page-title-wrap">
          <p class="page-label" id="page-label">All Tasks</p>
          <h1 class="page-title" id="page-title">My Workspace</h1>
        </div>
        <button class="btn btn-ghost" id="clear-btn" title="Clear all completed tasks">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
          Clear done
        </button>
      </div>

      <!-- Stats -->
      <div class="stats-row" role="group" aria-label="Task statistics">
        <div class="stat-card">
          <p class="stat-label">Total</p>
          <p class="stat-value" id="stat-total">0</p>
        </div>
        <div class="stat-card purple">
          <p class="stat-label">Active</p>
          <p class="stat-value" id="stat-active">0</p>
        </div>
        <div class="stat-card">
          <p class="stat-label">Completed</p>
          <p class="stat-value" id="stat-done">0</p>
        </div>
      </div>

      <!-- Add Task -->
      <div class="input-section" role="form" aria-label="Add new task">
        <div class="input-row">
          <input
            type="text"
            id="task-input"
            class="task-input"
            placeholder="Add a new task… Press Enter to save"
            aria-label="Task description"
            maxlength="120"
          />
          <button class="btn btn-primary" id="add-btn" aria-label="Add task">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add
          </button>
        </div>
        <div class="input-meta">
          <select class="meta-select" id="input-category" aria-label="Category">
            <option value="">📁 Category</option>
            <option value="Work">💼 Work</option>
            <option value="Personal">🏠 Personal</option>
            <option value="Shopping">🛒 Shopping</option>
            <option value="Health">💪 Health</option>
            <option value="Learning">📚 Learning</option>
          </select>
          <select class="meta-select" id="input-priority" aria-label="Priority">
            <option value="medium">⚡ Medium</option>
            <option value="high">🔴 High</option>
            <option value="low">🟢 Low</option>
          </select>
          <input type="date" class="meta-select" id="input-due" aria-label="Due date" />
          <span class="kbd" style="margin-left:auto;" aria-hidden="true">↵ Enter</span>
        </div>
      </div>

      <!-- Toolbar -->
      <div class="toolbar">
        <div class="filter-group" role="group" aria-label="Filter tasks">
          <button class="filter-btn active" data-mobile-filter="all">All</button>
          <button class="filter-btn" data-mobile-filter="active">Active</button>
          <button class="filter-btn" data-mobile-filter="done">Done</button>
        </div>
        <div class="search-wrap">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="search" class="search-input" id="search-input" placeholder="Search tasks…" aria-label="Search tasks" />
        </div>
      </div>

      <!-- Task List -->
      <div id="task-list" class="task-list" role="list" aria-label="Task list" aria-live="polite"></div>
    </main>
  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-heading">
    <div class="modal">
      <h2 class="modal-title" id="modal-heading">Edit Task</h2>
      <div>
        <label class="modal-label" for="modal-text">Task</label>
        <input type="text" class="modal-input" id="modal-text" maxlength="120" />
      </div>
      <div>
        <label class="modal-label" for="modal-category">Category</label>
        <select class="modal-input" id="modal-category">
          <option value="">No category</option>
          <option value="Work">💼 Work</option>
          <option value="Personal">🏠 Personal</option>
          <option value="Shopping">🛒 Shopping</option>
          <option value="Health">💪 Health</option>
          <option value="Learning">📚 Learning</option>
        </select>
      </div>
      <div>
        <label class="modal-label" for="modal-priority">Priority</label>
        <select class="modal-input" id="modal-priority">
          <option value="medium">⚡ Medium</option>
          <option value="high">🔴 High</option>
          <option value="low">🟢 Low</option>
        </select>
      </div>
      <div>
        <label class="modal-label" for="modal-due">Due Date</label>
        <input type="date" class="modal-input" id="modal-due" />
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="modal-cancel">Cancel</button>
        <button class="btn btn-primary" id="modal-save">Save Changes</button>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toasts" aria-live="polite" aria-atomic="true"></div>

  <script>
    // =============================================
    // STATE
    // =============================================
    let tasks = [
      { id: 1, text: 'Build a portfolio website', category: 'Learning', priority: 'high', due: '', done: false, createdAt: Date.now() - 86400000 },
      { id: 2, text: 'Push To-Do app to GitHub', category: 'Work', priority: 'high', due: '', done: false, createdAt: Date.now() - 3600000 },
      { id: 3, text: 'Learn React fundamentals', category: 'Learning', priority: 'medium', due: '', done: false, createdAt: Date.now() - 7200000 },
      { id: 4, text: 'Go for a 30min run', category: 'Health', priority: 'low', due: '', done: true, createdAt: Date.now() - 172800000 },
    ];
    let nextId = 10;
    let filter = 'all';
    let searchQuery = '';
    let editingId = null;

    // =============================================
    // THEME
    // =============================================
    (function(){
      const t = document.querySelector('[data-theme-toggle]');
      const r = document.documentElement;
      let d = 'dark';
      r.setAttribute('data-theme', d);
      if (t) t.addEventListener('click', () => {
        d = d === 'dark' ? 'light' : 'dark';
        r.setAttribute('data-theme', d);
        t.setAttribute('aria-label', 'Switch to ' + (d === 'dark' ? 'light' : 'dark') + ' mode');
        t.innerHTML = d === 'dark'
          ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'
          : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
      });
    })();

    // =============================================
    // GREETING
    // =============================================
    function setGreeting() {
      const h = new Date().getHours();
      const g = h < 12 ? 'Good morning' : h < 18 ? 'Good afternoon' : 'Good evening';
      document.getElementById('greeting').textContent = g + ', Iliya 👋';
    }
    setGreeting();

    // =============================================
    // TOAST
    // =============================================
    function showToast(msg, type = 'info') {
      const c = document.getElementById('toasts');
      const t = document.createElement('div');
      t.className = 'toast ' + type;
      t.innerHTML = '<span class="toast-dot"></span>' + msg;
      c.appendChild(t);
      setTimeout(() => {
        t.classList.add('out');
        t.addEventListener('animationend', () => t.remove());
      }, 2800);
    }

    // =============================================
    // CONFETTI
    // =============================================
    function confetti() {
      const colors = ['#8b5cf6','#a78bfa','#c4b5fd','#ffffff','#7c3aed'];
      for (let i = 0; i < 28; i++) {
        const el = document.createElement('div');
        el.className = 'confetti-piece';
        el.style.cssText = `
          left:${Math.random()*100}vw;
          top:${20 + Math.random()*30}vh;
          background:${colors[Math.floor(Math.random()*colors.length)]};
          animation-delay:${Math.random()*0.4}s;
          animation-duration:${0.8 + Math.random()*0.8}s;
        `;
        document.body.appendChild(el);
        el.addEventListener('animationend', () => el.remove());
      }
    }

    // =============================================
    // ANIMATE NUMBER
    // =============================================
    function animateNumber(el, val) {
      const current = parseInt(el.textContent) || 0;
      if (current === val) return;
      const steps = 12;
      let step = 0;
      const diff = val - current;
      const timer = setInterval(() => {
        step++;
        el.textContent = Math.round(current + (diff * step / steps));
        if (step >= steps) { el.textContent = val; clearInterval(timer); }
      }, 20);
    }

    // =============================================
    // RENDER
    // =============================================
    function getFiltered() {
      let list = [...tasks];
      // Sidebar filter
      if (filter === 'active') list = list.filter(t => !t.done);
      else if (filter === 'done') list = list.filter(t => t.done);
      else if (filter === 'high') list = list.filter(t => t.priority === 'high');
      else if (filter.startsWith('cat:')) list = list.filter(t => t.category === filter.slice(4));
      // Search
      if (searchQuery) list = list.filter(t => t.text.toLowerCase().includes(searchQuery.toLowerCase()) || (t.category && t.category.toLowerCase().includes(searchQuery.toLowerCase())));
      return list;
    }

    function formatDate(s) {
      if (!s) return '';
      const d = new Date(s + 'T00:00');
      const today = new Date(); today.setHours(0,0,0,0);
      const diff = Math.round((d - today) / 86400000);
      if (diff === 0) return '📅 Today';
      if (diff === 1) return '📅 Tomorrow';
      if (diff < 0) return '⚠️ Overdue';
      return '📅 ' + d.toLocaleDateString('en-GB', { day:'numeric', month:'short' });
    }

    function render() {
      const list = document.getElementById('task-list');
      const filtered = getFiltered();

      // Stats
      const total = tasks.length;
      const done = tasks.filter(t => t.done).length;
      const active = total - done;
      animateNumber(document.getElementById('stat-total'), total);
      animateNumber(document.getElementById('stat-active'), active);
      animateNumber(document.getElementById('stat-done'), done);

      // Sidebar counts
      document.getElementById('count-all').textContent = tasks.length;
      document.getElementById('count-active').textContent = tasks.filter(t => !t.done).length;
      document.getElementById('count-done').textContent = tasks.filter(t => t.done).length;
      document.getElementById('count-high').textContent = tasks.filter(t => t.priority === 'high' && !t.done).length;

      // Progress ring
      const pct = total > 0 ? Math.round((done / total) * 100) : 0;
      const circumference = 2 * Math.PI * 24;
      const offset = circumference - (pct / 100) * circumference;
      document.getElementById('progress-ring').style.strokeDashoffset = offset;
      document.getElementById('progress-pct').textContent = pct + '%';
      document.getElementById('progress-sub').textContent = done + ' of ' + total + ' done';

      // Category sidebar
      const cats = [...new Set(tasks.map(t => t.category).filter(Boolean))];
      const catNav = document.getElementById('category-nav');
      catNav.innerHTML = cats.map(c => `
        <button class="sidebar-item ${filter === 'cat:' + c ? 'active' : ''}" data-filter="cat:${c}" aria-pressed="${filter === 'cat:' + c}">
          <span style="font-size:var(--text-sm)">${getCatEmoji(c)}</span>
          ${c}
          <span class="count">${tasks.filter(t => t.category === c && !t.done).length}</span>
        </button>
      `).join('');
      catNav.querySelectorAll('.sidebar-item').forEach(btn => {
        btn.addEventListener('click', () => { filter = btn.dataset.filter; render(); syncSidebarActive(); });
      });

      // Empty state
      if (filtered.length === 0) {
        list.innerHTML = `
          <div class="empty-state" role="status">
            <div class="empty-icon" aria-hidden="true">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
            </div>
            <h3 class="empty-title">${searchQuery ? 'No results found' : 'All clear!'}</h3>
            <p class="empty-sub">${searchQuery ? 'Try a different search term.' : 'Add a task above to get started.'}</p>
          </div>`;
        return;
      }

      // Group: active then done
      const active_tasks = filtered.filter(t => !t.done);
      const done_tasks = filtered.filter(t => t.done);
      let html = '';
      if (active_tasks.length) {
        if (done_tasks.length) html += `<div class="task-group-label">Active (${active_tasks.length})</div>`;
        html += active_tasks.map(t => taskHTML(t)).join('');
      }
      if (done_tasks.length) {
        html += `<div class="task-group-label">Completed (${done_tasks.length})</div>`;
        html += done_tasks.map(t => taskHTML(t)).join('');
      }
      list.innerHTML = html;

      // Bind events
      list.querySelectorAll('[data-toggle]').forEach(el => el.addEventListener('click', () => toggleTask(+el.dataset.toggle)));
      list.querySelectorAll('[data-delete]').forEach(el => el.addEventListener('click', () => deleteTask(+el.dataset.delete)));
      list.querySelectorAll('[data-edit]').forEach(el => el.addEventListener('click', () => openEdit(+el.dataset.edit)));
    }

    function getCatEmoji(c) {
      return { Work:'💼', Personal:'🏠', Shopping:'🛒', Health:'💪', Learning:'📚' }[c] || '📁';
    }

    function taskHTML(t) {
      return `
        <div class="task-item priority-${t.priority} ${t.done ? 'done' : ''}" role="listitem" id="task-${t.id}">
          <div class="check-wrap">
            <button class="task-checkbox ${t.done ? 'checked' : ''}" data-toggle="${t.id}" aria-label="${t.done ? 'Mark incomplete' : 'Mark complete'}" aria-pressed="${t.done}">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
            </button>
          </div>
          <div class="task-content">
            <span class="task-text">${escapeHTML(t.text)}</span>
            <div class="task-meta">
              ${t.category ? `<span class="tag tag-category">${getCatEmoji(t.category)} ${t.category}</span>` : ''}
              ${t.priority !== 'medium' ? `<span class="tag tag-priority-${t.priority}">${t.priority === 'high' ? '🔴 High' : '🟢 Low'}</span>` : ''}
              ${t.due ? `<span class="tag tag-date">${formatDate(t.due)}</span>` : ''}
            </div>
          </div>
          <div class="task-actions" aria-label="Task actions">
            <button class="task-action-btn edit" data-edit="${t.id}" aria-label="Edit task">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button class="task-action-btn delete" data-delete="${t.id}" aria-label="Delete task">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
            </button>
          </div>
        </div>`;
    }

    function escapeHTML(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // =============================================
    // SIDEBAR ACTIVE SYNC
    // =============================================
    function syncSidebarActive() {
      document.querySelectorAll('.sidebar-item[data-filter]').forEach(btn => {
        const isActive = btn.dataset.filter === filter;
        btn.classList.toggle('active', isActive);
        btn.setAttribute('aria-pressed', isActive);
      });
      const labels = { all:'All Tasks', active:'Active Tasks', done:'Completed', high:'High Priority' };
      const label = labels[filter] || (filter.startsWith('cat:') ? filter.slice(4) : 'Tasks');
      document.getElementById('page-label').textContent = label;
    }

    // =============================================
    // ACTIONS
    // =============================================
    function addTask() {
      const input = document.getElementById('task-input');
      const text = input.value.trim();
      if (!text) { input.focus(); return; }
      const task = {
        id: ++nextId,
        text,
        category: document.getElementById('input-category').value,
        priority: document.getElementById('input-priority').value,
        due: document.getElementById('input-due').value,
        done: false,
        createdAt: Date.now()
      };
      tasks.unshift(task);
      input.value = '';
      input.focus();
      render();
      showToast('Task added', 'success');
    }

    function toggleTask(id) {
      const task = tasks.find(t => t.id === id);
      if (!task) return;
      task.done = !task.done;
      const wasAllDone = !task.done && tasks.every(t => t.done);
      render();
      if (task.done) {
        showToast('Task completed! 🎉', 'success');
        if (tasks.filter(t => !t.done).length === 0 && tasks.length > 0) {
          setTimeout(confetti, 200);
          showToast('All tasks done! Amazing! 🚀', 'success');
        }
      }
    }

    function deleteTask(id) {
      const el = document.getElementById('task-' + id);
      if (el) {
        el.classList.add('removing');
        el.addEventListener('animationend', () => {
          tasks = tasks.filter(t => t.id !== id);
          render();
          showToast('Task deleted', 'error');
        }, { once: true });
      }
    }

    // =============================================
    // EDIT MODAL
    // =============================================
    function openEdit(id) {
      const task = tasks.find(t => t.id === id);
      if (!task) return;
      editingId = id;
      document.getElementById('modal-text').value = task.text;
      document.getElementById('modal-category').value = task.category || '';
      document.getElementById('modal-priority').value = task.priority;
      document.getElementById('modal-due').value = task.due || '';
      document.getElementById('modal').classList.add('open');
      document.getElementById('modal-text').focus();
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('open');
      editingId = null;
    }

    function saveEdit() {
      const text = document.getElementById('modal-text').value.trim();
      if (!text) return;
      const task = tasks.find(t => t.id === editingId);
      if (!task) return;
      task.text = text;
      task.category = document.getElementById('modal-category').value;
      task.priority = document.getElementById('modal-priority').value;
      task.due = document.getElementById('modal-due').value;
      closeModal();
      render();
      showToast('Task updated', 'info');
    }

    // =============================================
    // EVENT LISTENERS
    // =============================================
    document.getElementById('add-btn').addEventListener('click', addTask);
    document.getElementById('task-input').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

    // Sidebar nav
    document.querySelectorAll('.sidebar-item[data-filter]').forEach(btn => {
      btn.addEventListener('click', () => { filter = btn.dataset.filter; render(); syncSidebarActive(); });
    });

    // Mobile filter
    document.querySelectorAll('[data-mobile-filter]').forEach(btn => {
      btn.addEventListener('click', () => {
        filter = btn.dataset.mobileFilter;
        document.querySelectorAll('[data-mobile-filter]').forEach(b => b.classList.toggle('active', b === btn));
        syncSidebarActive();
        render();
      });
    });

    // Search
    document.getElementById('search-input').addEventListener('input', e => {
      searchQuery = e.target.value;
      render();
    });

    // Clear done
    document.getElementById('clear-btn').addEventListener('click', () => {
      const count = tasks.filter(t => t.done).length;
      if (!count) { showToast('No completed tasks to clear', 'info'); return; }
      tasks = tasks.filter(t => !t.done);
      render();
      showToast(count + ' task' + (count > 1 ? 's' : '') + ' cleared', 'info');
    });

    // Modal
    document.getElementById('modal-cancel').addEventListener('click', closeModal);
    document.getElementById('modal-save').addEventListener('click', saveEdit);
    document.getElementById('modal').addEventListener('click', e => { if (e.target === document.getElementById('modal')) closeModal(); });
    document.getElementById('modal-text').addEventListener('keydown', e => { if (e.key === 'Enter') saveEdit(); if (e.key === 'Escape') closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape' && document.getElementById('modal').classList.contains('open')) closeModal(); });

    // =============================================
    // INIT
    // =============================================
    render();
  </script>
</body>
</html>
